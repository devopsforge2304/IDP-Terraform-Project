name: IDP Terraform Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'files/infra-management/infra.yaml'
      - 'files/**/*.tf'
      - 'files/**/*.tfvars'
      - 'files/scripts/**'
      - '.github/workflows/idp-pipeline.yml'
  push:
    branches: [main]
    paths:
      - 'files/infra-management/infra.yaml'
      - 'files/**/*.tf'
      - 'files/**/*.tfvars'
      - 'files/scripts/**'
      - '.github/workflows/idp-pipeline.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"
  TF_WORKING_DIR: "files"
  REQUEST_CONFIG_PATH: "infra-management/infra.yaml"

permissions:
  id-token: write         # Required for AWS OIDC authentication
  contents: read          # Required for actions/checkout
  issues: write           # Required for your github-script PR comment
  pull-requests: write    # Required for your github-script PR comment

jobs:
  load-config:
    name: Load request config
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      tenant_name: ${{ steps.config.outputs.tenant_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - id: config
        name: Read infra.yaml
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "environment=$(yq -r '.environment' '${{ env.REQUEST_CONFIG_PATH }}')" >> "$GITHUB_OUTPUT"
          echo "tenant_name=$(yq -r '.tenant_name' '${{ env.REQUEST_CONFIG_PATH }}')" >> "$GITHUB_OUTPUT"

  validate-request:
    name: Validate request and policy
    runs-on: ubuntu-latest
    needs: load-config
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate YAML schema
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: ./scripts/policy-check.sh "${{ env.REQUEST_CONFIG_PATH }}"

  terraform-plan:
    name: Terraform fmt, validate, and plan
    runs-on: ubuntu-latest
    needs: [load-config, validate-request]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=idp/${{ needs.load-config.outputs.environment }}/${{ needs.load-config.outputs.tenant_name }}.tfstate"
        env:
          TF_VAR_gmail_sender_email: ${{ secrets.GMAIL_SENDER_EMAIL }}
          TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var-file="environments/${{ needs.load-config.outputs.environment == 'production' && 'prod' || needs.load-config.outputs.environment }}.tfvars" \
            -out=tfplan | tee plan.txt
        env:
          TF_VAR_gmail_sender_email: ${{ secrets.GMAIL_SENDER_EMAIL }}
          TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: files/tfplan

      - name: Comment plan summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = [
              '#### Terraform Plan for IDP',
              '',
              `Tenant: \`${{ needs.load-config.outputs.tenant_name }}\``,
              `Environment: \`${{ needs.load-config.outputs.environment }}\``,
              '',
              '```',
              fs.readFileSync('files/plan.txt', 'utf8').slice(0, 60000),
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  drift-detection:
    name: Drift detection
    runs-on: ubuntu-latest
    needs: [load-config, validate-request]
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=idp/${{ needs.load-config.outputs.environment }}/${{ needs.load-config.outputs.tenant_name }}.tfstate"
        env:
          TF_VAR_gmail_sender_email: ${{ secrets.GMAIL_SENDER_EMAIL }}
          TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Detect drift
        run: |
          terraform plan -detailed-exitcode -input=false \
            -var-file="environments/${{ needs.load-config.outputs.environment == 'production' && 'prod' || needs.load-config.outputs.environment }}.tfvars"
        env:
          TF_VAR_gmail_sender_email: ${{ secrets.GMAIL_SENDER_EMAIL }}
          TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}

  approval-gate:
    name: Approval gate
    runs-on: ubuntu-latest
    needs: [load-config, validate-request]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: ${{ needs.load-config.outputs.environment == 'production' && 'idp-production' || 'idp-nonprod' }}
    steps:
      - run: echo "Approval gate satisfied for ${{ needs.load-config.outputs.environment }}"

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: [load-config, validate-request, approval-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="key=idp/${{ needs.load-config.outputs.environment }}/${{ needs.load-config.outputs.tenant_name }}.tfstate"
        env:
          TF_VAR_gmail_sender_email: ${{ secrets.GMAIL_SENDER_EMAIL }}
          TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Terraform apply
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="environments/${{ needs.load-config.outputs.environment == 'production' && 'prod' || needs.load-config.outputs.environment }}.tfvars"
        env:
          TF_VAR_gmail_sender_email: ${{ secrets.GMAIL_SENDER_EMAIL }}
          TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
