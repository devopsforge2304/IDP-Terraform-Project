# ============================================================
# infra.yaml — Developer submits this file in a PR
# Terraform reads it and provisions exactly what's listed here
# ============================================================

tenant_name: acme-corp
environment: staging            # dev | test | qa | staging | production
team_email: platform@acme.com   # for cost reports and alerts
data_sensitivity: internal

resources:
  rds:
    enabled: true
    instance_class: db.t3.micro
    db_name: acmecorpdb
    multi_az: false
    backup_retention_days: 7

  redis:
    enabled: true
    node_type: cache.t3.micro
    num_nodes: 1

  ec2:
    enabled: false
    instance_type: t3.micro
    instance_count: 1
    backup_enabled: true
    # ami_id: ami-xxxxxxxxxxxxxxxxx

  s3:
    enabled: true
    versioning: true
    lifecycle_days: 90
